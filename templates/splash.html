{% extends 'base.html' %}
{% block title %}Welcome{% endblock %}

{% block extra_css %}
<style>
    .splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse 100% 80% at 50% 10%, rgba(61,107,255,0.18) 0%, transparent 55%),
                    radial-gradient(ellipse 60% 60% at 90% 80%, rgba(124,61,255,0.12) 0%, transparent 50%),
                    #090E17;
        z-index: 99999;
        color: #EDF2FF;
        text-align: center;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
    }

    /* Ambient orbs */
    .splash-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        pointer-events: none;
        animation: orb-pulse 5s ease-in-out infinite;
    }
    .orb-1 { width: 280px; height: 280px; background: rgba(61,107,255,0.15); top: -60px; left: -80px; animation-delay: 0s; }
    .orb-2 { width: 200px; height: 200px; background: rgba(124,61,255,0.12); bottom: 80px; right: -50px; animation-delay: 1.5s; }
    .orb-3 { width: 160px; height: 160px; background: rgba(16,217,140,0.07); bottom: 30%; left: 10%; animation-delay: 3s; }

    .splash-content { position: relative; z-index: 2; }

    .logo-mark {
        width: 88px; height: 88px;
        background: linear-gradient(135deg, rgba(61,107,255,0.2), rgba(124,61,255,0.15));
        border: 1px solid rgba(61,107,255,0.35);
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.75rem;
        box-shadow: 0 0 0 8px rgba(61,107,255,0.06),
                    0 20px 50px rgba(61,107,255,0.25),
                    inset 0 1px 0 rgba(255,255,255,0.1);
        backdrop-filter: blur(12px);
        animation: float 5s ease-in-out infinite;
    }

    .app-name {
        font-size: 3.2rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #EDF2FF 30%, #7C9FFF 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
    }

    .app-tagline {
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #3D6BFF;
        margin-bottom: 3.5rem;
        opacity: 0.9;
    }

    .splash-progress-track {
        width: 120px;
        height: 3px;
        background: rgba(255,255,255,0.07);
        border-radius: 9999px;
        overflow: hidden;
        margin: 0 auto;
    }
    .splash-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #3D6BFF, #7C3DFF);
        border-radius: 9999px;
        animation: progressLoad 2.6s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes progressLoad {
        0%   { width: 0%; }
        60%  { width: 70%; }
        85%  { width: 88%; }
        100% { width: 100%; }
    }
</style>
{% endblock %}

{% block content %}
<div class="splash-container">
    <div class="splash-orb orb-1"></div>
    <div class="splash-orb orb-2"></div>
    <div class="splash-orb orb-3"></div>

    <div class="splash-content">
        <div class="logo-mark animate-fade-in-up">
            <i data-feather="link-2" style="width: 42px; height: 42px; color: #5A8BFF;"></i>
        </div>
        <h1 class="app-name animate-fade-in-up" style="animation-delay:0.12s">Paylink</h1>
        <p class="app-tagline animate-fade-in-up" style="animation-delay:0.22s">Enterprise Banking Platform</p>
        <div class="splash-progress-track animate-fade-in-up" style="animation-delay:0.35s">
            <div class="splash-progress-fill"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    setTimeout(() => { window.location.href = "{{ url_for('onboarding') }}"; }, 2900);
</script>
{% endblock %}
