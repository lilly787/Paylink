{% extends 'base.html' %}

{% block title %}Welcome{% endblock %}

{% block extra_css %}
<style>
    .splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle at center, #14223C 0%, #0B1528 100%);
        z-index: 99999;
        color: #F8FAFC; /* Ice White text */
        text-align: center;
        font-family: 'Inter', sans-serif;
    }
    .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 90px;
        height: 90px;
        background: rgba(20, 34, 60, 0.6);
        border: 1.5px solid rgba(59, 130, 246, 0.45); /* Glowing blue border */
        border-radius: 24px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        margin-bottom: 2rem;
        box-shadow: 0 15px 35px rgba(37, 99, 235, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.1);
    }
    .app-name {
        font-size: 3rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        margin-bottom: 0.5rem;
        color: #F8FAFC;
        text-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }
    .app-subtitle {
        font-size: 0.85rem;
        font-weight: 600;
        color: #60A5FA; /* Electric Ice Blue */
        opacity: 0.95;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 3rem;
    }
    .loading-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.08);
        border-top-color: #3B82F6; /* Neon Sapphire Blue */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
{% endblock %}

{% block content %}
<div class="splash-container">
    <div class="logo-container animate-pulse-slow">
        <i data-feather="link-2" style="width: 44px; height: 44px; color: #3B82F6;"></i>
    </div>
    <h1 class="app-name animate-fade-in-up">Paylink</h1>
    <p class="app-subtitle animate-fade-in-up" style="animation-delay: 0.15s;">Swiss Fintech Ecosystem</p>
    <div class="loading-spinner animate-fade-in-up" style="animation-delay: 0.3s;"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    setTimeout(() => {
        window.location.href = "{{ url_for('onboarding') }}";
    }, 2800);
</script>
{% endblock %}
