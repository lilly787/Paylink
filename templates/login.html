{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        padding: var(--space-xl) var(--space-md) var(--space-xl);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
    }

    /* Ambient background orbs */
    .auth-container::before {
        content: '';
        position: absolute;
        width: 340px; height: 340px;
        background: radial-gradient(circle, rgba(61,107,255,0.13) 0%, transparent 70%);
        top: -100px; right: -120px;
        pointer-events: none;
        border-radius: 50%;
    }
    .auth-container::after {
        content: '';
        position: absolute;
        width: 260px; height: 260px;
        background: radial-gradient(circle, rgba(124,61,255,0.09) 0%, transparent 70%);
        bottom: 60px; left: -80px;
        pointer-events: none;
        border-radius: 50%;
    }

    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--text-muted);
        text-decoration: none;
        margin-bottom: var(--space-xl);
        font-weight: 500;
        font-size: 0.875rem;
        font-family: 'Outfit', sans-serif;
        transition: color 0.2s;
        position: relative; z-index: 1;
    }
    .back-btn:hover { color: var(--brand-accent); }

    .auth-logo {
        width: 56px; height: 56px;
        background: linear-gradient(135deg, rgba(61,107,255,0.2), rgba(124,61,255,0.15));
        border: 1px solid rgba(61,107,255,0.3);
        border-radius: 18px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 1.5rem;
        box-shadow: 0 8px 24px rgba(61,107,255,0.2);
        position: relative; z-index: 1;
    }

    .auth-header {
        margin-bottom: var(--space-xl);
        position: relative; z-index: 1;
    }
    .auth-header h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 0.4rem;
        background: linear-gradient(135deg, var(--text) 40%, var(--brand-accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .auth-header p { color: var(--text-muted); font-size: 0.9rem; }

    .auth-form { flex: 1; position: relative; z-index: 1; }

    .auth-divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: var(--space-md) 0;
        color: var(--text-muted);
        font-size: 0.8rem;
    }
    .auth-divider::before, .auth-divider::after {
        content: ''; flex: 1; height: 1px; background: var(--divider);
    }

    .forgot-password {
        text-align: right;
        margin-bottom: var(--space-md);
    }
    .forgot-password a {
        color: var(--brand-accent);
        font-size: 0.8rem;
        text-decoration: none;
        font-weight: 600;
        font-family: 'Outfit', sans-serif;
    }

    .remember-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-md);
    }
    .remember-me {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
        cursor: pointer;
    }
    .remember-me input[type="checkbox"] {
        accent-color: var(--brand);
        width: 16px; height: 16px;
        cursor: pointer;
    }

    .auth-footer {
        text-align: center;
        margin-top: var(--space-lg);
        font-size: 0.875rem;
        color: var(--text-muted);
        position: relative; z-index: 1;
        font-family: 'Outfit', sans-serif;
    }
    .auth-footer a {
        color: var(--brand-accent);
        font-weight: 700;
        text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* Input with icon wrapper */
    .input-icon-wrap {
        position: relative;
    }
    .input-icon-wrap .input-field {
        padding-left: 2.75rem;
    }
    .input-icon-wrap .field-icon {
        position: absolute;
        left: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        width: 16px; height: 16px;
        pointer-events: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in-up">
    <a href="{{ url_for('onboarding') }}" class="back-btn">
        <i data-feather="arrow-left" style="width:16px;height:16px;"></i> Back
    </a>

    <div class="auth-logo animate-float">
        <i data-feather="link-2" style="width:28px;height:28px;color:#5A8BFF;"></i>
    </div>

    <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to your Paylink account</p>
    </div>

    <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="input-group">
            <label class="input-label" for="identifier">Email or Phone</label>
            <div class="input-icon-wrap">
                <i data-feather="mail" class="field-icon"></i>
                <input type="text" id="identifier" class="input-field" placeholder="you@example.com" autocomplete="email" required>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label" for="password">Password</label>
            <div class="input-icon-wrap">
                <i data-feather="lock" class="field-icon"></i>
                <input type="password" id="password" class="input-field" placeholder="••••••••" autocomplete="current-password" required>
            </div>
        </div>

        <div class="remember-row">
            <label class="remember-me">
                <input type="checkbox"> Remember me
            </label>
            <div class="forgot-password" style="margin-bottom:0;">
                <a href="#">Forgot Password?</a>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" id="login-submit-btn" style="margin-top:0.5rem;">
            <i data-feather="log-in" style="width:18px;height:18px;margin-right:8px;"></i>
            Sign In
        </button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('register') }}">Create Account</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function handleLogin(event) {
        event.preventDefault();
        const btn = document.getElementById('login-submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<div style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>';

        const identifier = document.getElementById('identifier').value;
        const password = document.getElementById('password').value;
        const success = await loginUser(identifier, password);

        if (success) {
            window.location.href = "{{ url_for('otp') }}";
        } else {
            btn.disabled = false;
            btn.innerHTML = '<i data-feather="log-in" style="width:18px;height:18px;margin-right:8px;"></i> Sign In';
            feather.replace();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('msg') === 'frozen') {
            showToast('This account has been frozen by administration.', 'error');
        }
    });
</script>
{% endblock %}
